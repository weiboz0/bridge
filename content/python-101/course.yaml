title: Python 101 — Introduction to Programming
description: |
  A first course in Python. You'll learn to print output, store values
  in variables, do arithmetic, branch with conditionals, repeat with
  loops, and work with strings, lists, dicts, files, and classes by
  solving small problems that build on each other.
