id: e0115fa5-8b58-40dd-a6f3-a63e0958b8dc
slug: loops
title: 6. Loops
description: |
  Repeat work with `for ... in range(...)` and `while`. Use `break` to
  stop early and `continue` to skip the rest of an iteration.
gradeLevel: 9-12
subjectTags:
  - python
  - loops
standardsTags: []
estimatedMinutes: 40
materialType: notes
blocks:
  - type: heading
    text: Big idea
  - type: paragraph
    text: |
      A *loop* runs a block of code repeatedly. `for i in range(n)`
      runs the body `n` times with `i` taking values `0, 1, …, n-1`.
      `range(start, end)` goes from `start` up to (but not including)
      `end`. `while condition:` runs as long as the condition is true.
  - type: heading
    text: Worked example
  - type: code
    text: |
      total = 0
      for i in range(1, 5):
          total += i
      print(total)  # 1+2+3+4 = 10
  - type: heading
    text: Try it
  - type: problem-ref
    problemSlug: sum-1-to-n
    visibility: always
  - type: problem-ref
    problemSlug: multiplication-table
    visibility: always
  - type: problem-ref
    problemSlug: first-power-of-two-above-n
    visibility: always
  - type: heading
    text: Common pitfalls
  - type: list
    text: |
      `range(n)` goes 0..n-1, NOT 1..n. To get 1..n, use `range(1, n+1)`.
      `while True:` without a `break` runs forever.
      Modifying the loop variable inside a `for` loop usually doesn't
      do what you expect — Python re-binds `i` each iteration.
      Indentation marks the loop body, just like with `if`.
  - type: heading
    text: Vocabulary
  - type: list
    text: |
      iteration — one pass through the body.
      range(start, end) — a sequence of integers from start to end-1.
      break — exit the loop immediately.
      continue — skip to the next iteration.
problems:
  - id: 96fcd957-158a-4a66-8d25-23b6847a9a3c
    slug: sum-1-to-n
    title: Sum 1 to N
    description: |
      Read a positive integer N. Print the sum `1 + 2 + ... + N`.

      Use a loop. Don't use the formula `N(N+1)/2`.

      **Input:** `5`

      **Output:** `15`
    difficulty: easy
    gradeLevel: 9-12
    tags:
      - loops
      - accumulator
    starterCode:
      python: |
        n = int(input())
        # Sum the integers 1..n with a loop and print the result.
    solution:
      language: python
      code: |
        n = int(input())
        total = 0
        for i in range(1, n + 1):
            total += i
        print(total)
    testCases:
      - name: "Example: 5"
        stdin: "5"
        expectedStdout: "15"
        isExample: true
      - name: "Hidden: 1"
        stdin: "1"
        expectedStdout: "1"
        isExample: false
      - name: "Hidden: 100"
        stdin: "100"
        expectedStdout: "5050"
        isExample: false

  - id: 171dff6e-952a-425a-b3d0-66a5b090611a
    slug: multiplication-table
    title: Multiplication Table
    description: |
      Read a positive integer N. Print the multiplication table for N
      from 1 to 10, one row per line in the format `N x i = N*i`.

      **Input:** `3`

      **Output:**
      ```
      3 x 1 = 3
      3 x 2 = 6
      3 x 3 = 9
      3 x 4 = 12
      3 x 5 = 15
      3 x 6 = 18
      3 x 7 = 21
      3 x 8 = 24
      3 x 9 = 27
      3 x 10 = 30
      ```
    difficulty: easy
    gradeLevel: 9-12
    tags:
      - loops
      - f-strings
    starterCode:
      python: |
        n = int(input())
        # Print n's multiplication table from 1 to 10.
    solution:
      language: python
      code: |
        n = int(input())
        for i in range(1, 11):
            print(f"{n} x {i} = {n * i}")
    testCases:
      - name: Example
        stdin: "3"
        expectedStdout: |-
          3 x 1 = 3
          3 x 2 = 6
          3 x 3 = 9
          3 x 4 = 12
          3 x 5 = 15
          3 x 6 = 18
          3 x 7 = 21
          3 x 8 = 24
          3 x 9 = 27
          3 x 10 = 30
        isExample: true
      - name: "Hidden: 7"
        stdin: "7"
        expectedStdout: |-
          7 x 1 = 7
          7 x 2 = 14
          7 x 3 = 21
          7 x 4 = 28
          7 x 5 = 35
          7 x 6 = 42
          7 x 7 = 49
          7 x 8 = 56
          7 x 9 = 63
          7 x 10 = 70
        isExample: false

  - id: a1009846-479d-4dbb-b514-b0ea64292c3a
    slug: first-power-of-two-above-n
    title: First Power of 2 Above N
    description: |
      Read a positive integer N. Print the smallest power of 2 that is
      strictly greater than N.

      **Input:** `100`

      **Output:** `128`

      Use a `while` loop. Don't use `math.log2`.
    difficulty: medium
    gradeLevel: 9-12
    tags:
      - loops
      - while
    starterCode:
      python: |
        n = int(input())
        # Find the smallest power of 2 strictly greater than n.
    solution:
      language: python
      code: |
        n = int(input())
        p = 1
        while p <= n:
            p *= 2
        print(p)
    testCases:
      - name: "Example: 100"
        stdin: "100"
        expectedStdout: "128"
        isExample: true
      - name: "Hidden: 1"
        stdin: "1"
        expectedStdout: "2"
        isExample: false
      - name: "Hidden: exactly 64"
        stdin: "64"
        expectedStdout: "128"
        isExample: false
      - name: "Hidden: large"
        stdin: "999"
        expectedStdout: "1024"
        isExample: false
